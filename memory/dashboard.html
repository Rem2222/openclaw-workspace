<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 ByteRover Memory Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--surface:#12121f;--card:#181830;--border:#252545;--gold:#D4AF37;--teal:#4ECDC4;--purple:#A855F7;--red:#FF6B6B;--green:#51CF66;--orange:#FF9F43;--text:#e8e8f0;--dim:#6a6a8a;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.page{max-width:700px;margin:0 auto;padding:20px 16px 60px}
.header{text-align:center;padding:40px 0 24px}
.header .emoji{font-size:48px;margin-bottom:8px}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.header .date{color:var(--dim);font-size:12px;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.stat .num{font-size:36px;font-weight:800}
.stat .label{font-size:12px;color:var(--dim);margin-top:4px}
.stat.gold .num{color:var(--gold)}
.stat.teal .num{color:var(--teal)}
.stat.green .num{color:var(--green)}
.section{margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--dim)}
.card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1a1a2a}
.entry:last-child{border-bottom:none}
.entry .content{flex:1}
.entry .title{font-size:13px;font-weight:600}
.entry .meta{font-size:11px;color:var(--dim);margin-top:2px}
.entry .type{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.type.decision{background:#D4AF3722;color:var(--gold)}
.type.fact{background:#4ECDC422;color:var(--teal)}
.type.lesson{background:#A855F722;color:var(--purple)}
.type.project{background:#51CF6622;color:var(--green)}
.no-data{color:var(--dim);font-size:13px;text-align:center;padding:20px}
.footer{text-align:center;padding:24px 0;color:var(--dim);font-size:11px}
@media(max-width:500px){
  .stats{grid-template-columns:1fr}
  .page{padding:12px}
}
</style>
</head>
<body>
<div class="page">
<div class="header">
  <div class="emoji">🧠</div>
  <h1>ByteRover Memory</h1>
  <div class="date" id="genTime"></div>
</div>

<div class="stats">
  <div class="stat gold">
    <div class="num" id="totalEntries">0</div>
    <div class="label">Всего записей</div>
  </div>
  <div class="stat teal">
    <div class="num" id="recentEntries">0</div>
    <div class="label">За неделю</div>
  </div>
  <div class="stat green">
    <div class="num" id="dreamCount">0</div>
    <div class="label">Dream циклов</div>
  </div>
</div>

<div class="section">
  <div class="section-title">📝 Последние записи</div>
  <div class="card" id="recentList">
    <div class="no-data">Нет записей</div>
  </div>
</div>

<div class="section">
  <div class="section-title">🔄 Активность по типам</div>
  <div class="card" id="typeStats">
    <div class="no-data">Нет данных</div>
  </div>
</div>

<div class="footer">
  openclaw-auto-dream v3.4 (ByteRover edition)<br>
  Сгенерировано автоматически
</div>
</div>

<script>
const D = {  "generatedAt": "2026-04-05T01:00:00Z",  "totalEntries": 28,  "recentEntries": 3,  "dreamCount": 2,  "recentItems": [    {      "type": "fact",      "typeLabel": "Факт",      "title": "VPS провайдеры: Contabo выбран для OpenClaw, Hetzner/DO/OVH заблокированы из РФ",      "date": "2026-04-04",      "source": "memory/2026-04-04.md"    },    {      "type": "lesson",      "typeLabel": "Урок",      "title": "Gateway TLS config: gateway.tls.* а не gateway.https",      "date": "2026-04-04",      "source": "memory/2026-04-04.md"    },    {      "type": "project",      "typeLabel": "Проект",      "title": "Dashboard рефакторинг: производительность улучшена в 10-15x, исправлен инъекция команд",      "date": "2026-04-02",      "source": "memory/2026-04-02.md"    }  ],  "typeStats": {    "decision": 1,    "fact": 1,    "lesson": 1,    "project": 1  }};
document.getElementById('genTime').textContent = D.generatedAt ? 'Обновлено: ' + new Date(D.generatedAt).toLocaleString('ru-RU') : '';
document.getElementById('totalEntries').textContent = D.totalEntries || 0;
document.getElementById('recentEntries').textContent = D.recentEntries || 0;
document.getElementById('dreamCount').textContent = D.dreamCount || 0;

const recentList = document.getElementById('recentList');
if (D.recentItems && D.recentItems.length) {
  recentList.innerHTML = D.recentItems.map(item => `
    <div class="entry">
      <span class="type ${item.type}">${item.typeLabel}</span>
      <div class="content">
        <div class="title">${item.title}</div>
        <div class="meta">${item.date} ${item.source ? '· ' + item.source : ''}</div>
      </div>
    </div>
  `).join('');
} else {
  recentList.innerHTML = '<div class="no-data">Нет свежих записей</div>';
}

const typeStats = document.getElementById('typeStats');
if (D.typeStats) {
  const total = Object.values(D.typeStats).reduce((a,b)=>a+b,0);
  if (total > 0) {
    typeStats.innerHTML = Object.entries(D.typeStats).map(([type, count]) => {
      const pct = Math.round(count/total*100);
      const colors = {decision:'#D4AF37',fact:'#4ECDC4',lesson:'#A855F7',project:'#51CF66',other:'#6a6a8a'};
      const labels = {decision:'Решения',fact:'Факты',lesson:'Уроки',project:'Проекты',other:'Прочее'};
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a2a">
        <span style="color:${colors[type]||colors.other}">${labels[type]||type}</span>
        <span style="color:var(--dim)">${count} (${pct}%)</span>
      </div>`;
    }).join('');
  }
}
</script>
</body>
</html>
